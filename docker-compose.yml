version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: podcast_stats_db
    environment:
      POSTGRES_USER: podcast_user
      POSTGRES_PASSWORD: podcast_password
      POSTGRES_DB: podcast_stats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U podcast_user -d podcast_stats"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: podcast_stats_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://podcast_user:podcast_password@postgres:5432/podcast_stats
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: podcast_user
      POSTGRES_PASSWORD: podcast_password
      POSTGRES_DB: podcast_stats
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: